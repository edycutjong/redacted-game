truth:
  culprit: T4
  motive: "Nash cut the relief combination himself during the July audit and initialed the seal he later broke. Fourteen years of counting other men's money, one October page left blank, and a left-handed man let himself in politely."
  summary: "Silas Nash, the night auditor, opened the Halloway vault. The relief combination cut in July lived in the audit-room copy; the October seal line is blank; the man at the dial worked left-handed by lamplight and rode the 4:05 with the bank's own sample case."
  reveal:
    - "The vault opened at 2:11 for the true numbers — two days after the working combination died."
    - "Only the July relief combination was live. Managers were barred from it in '44. Tellers bank blind. The old cracksman was in ward six with hands that cannot dial."
    - "The man at the dial worked left-handed and carried the bonds out in the bank's own fiber case, north on the 4:05."
    - "The audit-room copy of the relief numbers was made in July, sealed in July — and the October seal line is blank."
    - "Silas Nash counted the bank's money by night, cut its spare key in July, and wrote the whole story left-handed. The blank line in the seal register is his signature."

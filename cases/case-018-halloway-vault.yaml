shards:
  # ---- G01: the vault was opened between two and three ----
  - id: K01
    doc: E1
    text: "The time-lock disc stopped when the door swung: 2:11 a.m., Sunday night into Monday."
    supports: [G01]
  - id: K02
    doc: E3
    text: "The porter, from the coal cellar: footsteps overhead 'a while after two — unhurried, like a man who owned the floor.'"
    supports: [G01]
  - id: K03
    doc: E3
    text: "Beat officer tried the Court Square doors at 1:50 — all fast, all dark, nothing stirring."
    supports: [G01]

  # ---- G02: opened with a true combination, no force ----
  - id: K04
    doc: E1
    text: "Lock examiner: dialed clean and opened on the first pass. No drill, no soup, no fishing marks in the wards."
    supports: [G02]
  - id: K05
    doc: E1
    text: "Photographs: dial face unmarked, jamb unsprung, hinges undisturbed. The door was operated, not attacked."
    supports: [G02]
  - id: K06
    doc: E1
    text: "Tumbler wear is consistent with one practiced entry — no trial runs, no hesitation drag on the third wheel."
    supports: [G02]
  - id: K07
    doc: E1
    text: "Insurance examiner concurs: 'a key job in everything but the key — whoever dialed it held the true numbers.'"
    supports: [G02]

  # ---- G03: only the relief combination was live that night ----
  - id: K08
    doc: E2
    text: "Branch memo, Friday: working combination changed at close of business per quarterly schedule."
    supports: [G03]
  - id: K09
    doc: E2
    text: "Vault log: Friday's combination change witnessed and countersigned by two officers."
    supports: [G03]
  - id: K10
    doc: E2
    text: "Head office: a relief combination was cut during the July audit and held under seal against lock-out — the only other numbers that door has ever answered to."
    supports: [G03]
  - id: K11
    doc: E2
    text: "Seal register: the relief-combination envelope logged intact month by month since July — the October line is blank."
    supports: [G03, G10]

  # ---- G05: the man at the dial worked left-handed ----
  - id: K12
    doc: E3
    text: "The porter's one glimpse through the coal grate: lamp held high in the right hand, the dial worked with the left."
    supports: [G05]
  - id: K13
    doc: E1
    text: "Smudge drag across the ledger shelf runs right to left — a left hand steadying paper."
    supports: [G05]
  - id: K14
    doc: E1
    text: "Polish smears on the dial rim arc counterclockwise, the sweep of a left-handed grip."
    supports: [G05]
  - id: K15
    doc: E3
    text: "A cigarette stubbed cold on the floor — left of the stool, where a left-handed man rests his working arm."
    supports: [G05]


truth:
  culprit: S4
  motive: "Kessler hired Brandt to torch his own failing shop for the insurance. Brandt lit the naphtha early, before Kessler had cleared the stair — then snapped the Hollis from the dead man's chain as his fee, went over the fence, and burned his wrist doing it."
  summary: "Ivo Brandt set the Larchmont fire. The tall figure on the fence, the seared right wrist treated at St. Anselm's under 'E. Braun', and the Hollis watch pledged at Crane Bros. on the 14th all belong to the same man — the carpenter who knew where the naphtha sat and hasn't been seen since."
  reveal:
    - "The fire was set after one, with the shop's own naphtha, by someone who left over the yard fence."
    - "The widow was at the Marigold tables. The watchman was in the tank. The rival was forty miles away on two canes."
    - "The setter was tall, seared his right wrist, and carried Kessler's Hollis watch out through the smoke."
    - "On the 14th, a tall man with a dressed wrist pledged that watch at Crane Bros. for eleven dollars."
    - "Ivo Brandt built Kessler's shelves, knew the back room, and vanished the morning after. The ticket in the flop ledger was his receipt — and his confession."

contradictions:
  - a: SH38
    b: SH39
    note: "The 9:40 never ran — and the sister waited at Halbrook for no one. The widow's public statement cannot survive both lines."
  - a: SH40
    b: SH31
    note: "A watch cannot burn to nothing on the 12th and be pledged intact on the 14th. Someone walked it out of the fire."


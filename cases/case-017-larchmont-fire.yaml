# CASE #17 — THE LARCHMONT FIRE
# The engineered demo case (see SEED_DATA.md). The pawn-ticket shard SH31 is
# the pivot-pool head: every first-seen account (every judge) receives a
# board-absent shard, and SH31 completes the elimination of the crowd-favorite
# suspect the moment it is filed (61% -> 63%).
#
# All names, places and businesses are fictional. Closed world: everything
# needed to solve the case is inside this file.

format: 1
id: case-017
number: 17
title: The Larchmont Fire
tagline: A pawnshop burns at one in the morning. The owner never walks out. His hundred-dollar watch does.
author: rd_case_desk
era: "October, 1947"
question: Who set the Larchmont fire?

suspects:
  - id: S1
    name: Vera Kessler
    blurb: The widow. Says she took the 9:40 evening train to her sister in Halbrook and learned of the fire by wire. The insurance man keeps calling her "the beneficiary."
  - id: S2
    name: Dale Moran
    blurb: Night watchman at the freight yard behind the shop. Owed money all over the Row. Seen near the yard fence that evening, and everyone knows he knew the alley like his own pocket.
  - id: S3
    name: Felix Abernathy
    blurb: Rival pawnbroker three doors down, sixty years old and twice as bitter. Told anyone who would listen that Kessler's ruin would be "a civic improvement."
  - id: S4
    name: Ivo Brandt
    blurb: A drifter who did rough carpentry for shops on the Row. Quiet, tall, kept his gloves on indoors. Nobody has seen him since the morning after the fire.


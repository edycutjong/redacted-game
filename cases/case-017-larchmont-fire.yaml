      - text: "Deceased recovered at the foot of the stock-room stair: Emmett Kessler, proprietor, 58. See coroner's findings."
      - shard: SH01
      - shard: SH06
      - shard: SH08
      - shard: SH10
      - shard: SH11
      - shard: SH15
      - shard: SH17
      - text: "Public speculation that the fire was 'set for the insurance' is noted and is not evidence. The Row talks; this office measures."
  - id: D2
    title: CORONER'S FINDINGS
    lines:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>REDACTED — open the case</title>
    <style>
      /* Inline, self-contained fast feed view (splash/game split, VERIFIED.md). */
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        background: #0b0a07;
        color: #eae3d2;
        font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
      }
      .cover { max-width: 420px; width: 100%; }
      .plate { color: #facc15; letter-spacing: 0.14em; font-size: 13px; font-weight: 700; }
      h1 { font-size: 26px; margin: 8px 0 4px; letter-spacing: 0.02em; }
      p { color: #a8a08c; font-size: 13px; line-height: 1.6; }
      .meter { height: 12px; border: 1px solid #322c22; background: #242019; border-radius: 2px; overflow: hidden; margin: 14px 0 6px; }
      .meter > span { display: block; height: 100%; width: 61%; background: linear-gradient(90deg, #b8860b, #facc15); }
      .lbl { font-size: 11px; color: #a8a08c; letter-spacing: 0.08em; }
      .cta { margin-top: 18px; display: inline-block; background: #facc15; color: #0b0a07; font-weight: 700; letter-spacing: 0.08em; padding: 12px 20px; border-radius: 4px; border: 0; font-family: inherit; }
    </style>
  </head>
  <body>
    <div class="cover">
      <div class="plate" id="plate">CASE FILE · UNSOLVED</div>
      <h1 id="title">REDACTED</h1>
      <p>A daily noir case lives in this post. Your dossier is censored differently from everyone else's — nobody can solve it alone. The comment thread is the evidence board.</p>
      <div class="meter"><span id="bar"></span></div>
      <div class="lbl" id="lbl">peel your shard · file it · accuse before the verdict</div>
      <button class="cta">OPEN CASE FOLDER →</button>
    </div>
    <script>
      // Progressive enhancement: reflect the live meter if the API is reachable.
      fetch('/api/case')
        .then((r) => r.json())
        .then((d) => {
          if (!d || d.type !== 'case') return;
          document.getElementById('plate').textContent =
            'CASE #' + d.case.number + ' · ' + d.case.meter.pct + '% UNREDACTED';
          document.getElementById('title').textContent = d.case.title;
          document.getElementById('bar').style.width = d.case.meter.pct + '%';
          document.getElementById('lbl').textContent =
            d.case.meter.revealed + '/' + d.case.meter.total + ' shards on the board';
        })
        .catch(() => {});
    </script>
  </body>
</html>
